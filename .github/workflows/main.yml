name: Secret Example

on: [push]

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use API Key
        run: echo "Using secret"
        env:
          API_KEY: ${{ secrets.API_KEY }}

      - name: Connect to DB
        run: echo "DB Connected"
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
