jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Use API Key
        run: echo "API Key is $API_KEY"
        env:
          API_KEY: ${{ secrets.API_KEY }}
- name: Authenticate with API
  run: |
    curl -H "Authorization: Bearer $API_KEY" https://api.example.com/data
  env:
    API_KEY: ${{ secrets.API_KEY }}
